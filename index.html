<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kulutusvaikutus</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --green: #2ecc71; --red: #e74c3c; --gray: #95a5a6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; padding: env(safe-area-inset-top) 15px 15px 15px; margin: 0; }
        .container { max-width: 95%; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #333; }
        .stat-box { text-align: center; }
        .label { font-size: 0.7rem; color: #777; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .value { font-size: 1.25rem; font-weight: 800; display: block; }
        #chart-wrapper { background: var(--card); padding: 15px; border-radius: 16px; height: 70vh; border: 1px solid #333; }
        #debug { font-size: 0.65rem; color: #444; text-align: center; margin-top: 15px; }
        .info-btn { background: #333; border: none; color: #888; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin: 0; font-size: 1.2rem; color: #eee;">Kulutusvaikutus (20260312)</h2>
        <button class="info-btn" onclick="showInfo()">?</button>
    </div>

    <div class="stats">
        <div class="stat-box"><span class="label">Nyt</span><span class="value" id="now">--</span></div>
        <div class="stat-box"><span class="label">Kk Keski</span><span class="value" id="avg">--</span></div>
        <div class="stat-box"><span class="label">Vaikutus</span><span class="value" id="impact">--</span></div>
    </div>

    <div id="chart-wrapper">
        <canvas id="mainChart"></canvas>
    </div>
    
    <div id="debug">Ladataan...</div>
</div>

<script>
    // 1. CACHE BUSTER: Prevents the "stuck on old version" issue
    if (!window.location.search.includes('v=')) {
        window.location.href = window.location.pathname + '?v=' + Date.now();
    }

    let chart;
    const THRESHOLD = 1.0; 

    Chart.register(window['chartjs-plugin-annotation']);

async function loadData() {
        const debug = document.getElementById('debug');
        
        // Elering API: Finland region (ee), automatically handles CORS for browsers
        const now = new Date();
        const start = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
        const end = new Date(now.getTime() + 172800000).toISOString(); // +2 days
        
        const targetUrl = `https://dashboard.elering.ee/api/nps/price?start=${start}&end=${end}`;

        try {
            const res = await fetch(targetUrl);
            if (!res.ok) throw new Error("Haku epäonnistui");
            const json = await res.json();
            
            if (json && json.data && json.data.fi) {
                const formattedPrices = json.data.fi.map(p => ({
                    // Elering gives timestamp in seconds, we need milliseconds
                    date: new Date(p.timestamp * 1000), 
                    // Elering gives €/MWh, we convert to c/kWh and add 25.5% VAT
                    value: (p.price / 10) * 1.255 
                }));

                processData(formattedPrices);
                debug.innerText = "Päivitetty: " + new Date().toLocaleTimeString('fi-FI');
            }
        } catch (e) {
            debug.innerText = "Haku epäonnistui. Yritetään uudelleen...";
            console.error("API Error:", e);
            setTimeout(loadData, 30000); 
        }
    }
    
    function processData(prices) {
        const now = new Date();
        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
        
        // 1. Calculate Monthly Average
        const pastData = prices.filter(p => new Date(p.date) >= startOfMonth && new Date(p.date) <= now);
        const monthAvg = pastData.length > 0 ? (pastData.reduce((s, p) => s + p.value, 0) / pastData.length) : 0;

        // 2. Find "Now" Price (The hour block we are currently in)
        const currentPrice = prices.find(p => {
            const d = new Date(p.date);
            const nextHour = new Date(d.getTime() + 3600000);
            return d <= now && nextHour > now;
        })?.value || 0;

        // 3. Filter Chart Points (Starting from an hour ago until tomorrow night)
        const displayStart = new Date(now.getTime() - 3600000);
        const endLimit = new Date();
        endLimit.setDate(endLimit.getDate() + 1);
        endLimit.setHours(23, 59, 0);
        
        const chartPoints = prices.filter(p => {
            const d = new Date(p.date);
            return d >= displayStart && d <= endLimit;
        });

        // Update UI
        document.getElementById('now').innerText = currentPrice.toFixed(2) + " c";
        document.getElementById('avg').innerText = monthAvg.toFixed(2) + " c";
        
        const impact = currentPrice - monthAvg;
        const impEl = document.getElementById('impact');
        impEl.innerText = (impact > 0 ? "+" : "") + impact.toFixed(2);
        
        if (impact < -THRESHOLD) impEl.style.color = "var(--green)";
        else if (impact > THRESHOLD) impEl.style.color = "var(--red)";
        else impEl.style.color = "var(--gray)";

        renderChart(chartPoints, monthAvg);
    }

    function renderChart(points, avg) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chart) chart.destroy();
        
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: points.map(p => {
                    const d = new Date(p.date);
                    return d.getHours() + ":00";
                }),
                datasets: [{
                    data: points.map(p => p.value),
                    backgroundColor: points.map(p => {
                        if (p.value < (avg - THRESHOLD)) return '#2ecc71'; 
                        if (p.value > (avg + THRESHOLD)) return '#e74c3c'; 
                        return '#95a5a6';
                    }),
                    borderRadius: 3,
                    borderSkipped: false
                }]
            },
            options: {
                maintainAspectRatio: false,
                animation: false,
                plugins: {
                    legend: false,
                    annotation: {
                        annotations: {
                            box1: {
                                type: 'box',
                                scaleID: 'y',
                                yMin: avg - THRESHOLD,
                                yMax: avg + THRESHOLD,
                                backgroundColor: 'rgba(150, 150, 150, 0.08)',
                                borderWidth: 0,
                            },
                            line1: {
                                type: 'line',
                                scaleID: 'y',
                                value: avg,
                                borderColor: 'rgba(255, 255, 255, 0.4)',
                                borderWidth: 1,
                                borderDash: [5, 5],
                                label: {
                                    display: true,
                                    content: 'KA: ' + avg.toFixed(2),
                                    position: 'end',
                                    backgroundColor: 'rgba(0,0,0,0.8)',
                                    color: '#fff',
                                    font: { size: 10, weight: 'bold' }
                                }
                            }
                        }
                    }
                },
                scales: {
                    y: { grid: { color: '#222' }, ticks: { color: '#fff' } },
                    x: { grid: { display: false }, ticks: { color: '#fff', font: { size: 9 }, maxRotation: 0 } }
                }
            }
        });
    }

    loadData();
    setInterval(loadData, 900000);
</script>
</body>
</html>
